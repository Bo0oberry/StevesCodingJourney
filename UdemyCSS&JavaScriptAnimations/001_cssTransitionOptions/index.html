<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/UdemyCSS&JavaScriptAnimations/setup.css">
  <link rel="stylesheet" href="/UdemyCSS&JavaScriptAnimations/header.css">
  <link rel="stylesheet" href="/UdemyCSS&JavaScriptAnimations/nav.css">
  <title>CSS Transition Options</title>
  
  <style>
    .move {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      width: 120px;

      margin: 20px 0;
      padding: 11px;
      border-radius: 7px;
      background-color: mediumslateblue;
      color: yellow;
      text-align: center;
      
      transition-property: translate();
      transition-duration: 3s;
      transition-delay: 0.5s;
      
      &:hover { 
        transform: translate(500px ,0);
        font-size: 22px;
      }
    }
    
    div {
      background-color: red;
    }
    
    #ease {transition-timing-function: ease;}
    #linear {transition-timing-function: linear;}
    #ease-in {transition-timing-function: ease-in;}
    #ease-out {transition-timing-function: ease-out;}
    #ease-in-out {transition-timing-function: ease-in-out;}
  </style>
</head>

<body>
  <header>
    <h1>CSS Transition Options</h1>
  </header>
  
  
  <nav>
    <script src="/UdemyCSS&JavaScriptAnimations/navLinks.js"></script>
  </nav
  
  
  <main>
    <div id="ease" class="move">Ease</div>
    <div id="linear" class="move">Linear</div>
    <div id="ease-in" class="move">Ease-In</div>    
    <div id="ease-out" class="move">Ease-Out</div>    
    <div id="ease-in-out" class="move">Ease-In-Out</div>
  </main>
  
</body>

</html>
