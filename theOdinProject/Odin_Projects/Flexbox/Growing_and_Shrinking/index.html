<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Growing and Shrinking</h1>
    <h2>Knowledge Check</h2>
    <details>
        <summary>What are the 3 values defined in the shorthand flex property (e.g. flex: 1 1 auto)?</summary>
        <ul>
            <li>flex-grow</li>
            <li>flex-shrink</li>
            <li>flex-basis</li>
        </ul>
    </details>
    <details>
        <summary>What are the 3 defined values for the flex shorthand flex:auto?</summary>
        <ul>
            <li>flex-grow: 1</li>
            <li>flex-shrink: 1</li>
            <li>flex-basis: auto</li>
        </ul>
    </details>
</body>
</html>
